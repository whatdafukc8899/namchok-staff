<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ตารางงาน NAMCHOK99</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#0d0d0d;color:#f0f0f0;}

#login-screen{position:fixed;inset:0;background:#0d0d0d;z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
#login-screen.hide{display:none;}
.login-box{background:#1a1a1a;border:.5px solid #2a2a2a;border-radius:16px;padding:28px 24px;width:100%;max-width:340px;}
.login-title{text-align:center;font-size:20px;font-weight:700;color:#D4AF37;margin-bottom:4px;}
.login-sub{font-size:11px;color:#555;text-align:center;margin-bottom:24px;}
.login-lbl{font-size:11px;color:#888;margin-bottom:5px;}
.login-inp{width:100%;background:#111;border:.5px solid #2a2a2a;color:#f0f0f0;border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:14px;outline:none;}
.login-inp:focus{border-color:#D4AF37;}
.login-btn{width:100%;background:#D4AF37;color:#0d0d0d;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
.login-err{font-size:12px;color:#e05c5c;text-align:center;margin-top:10px;min-height:18px;}

.topbar{background:#1a1a1a;border-bottom:.5px solid #2a2a2a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-logo{font-size:14px;font-weight:600;color:#D4AF37;}
.logout-btn{background:#2a1a1a;border:.5px solid #4a2a2a;color:#e05c5c;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;}

.wrap{padding:12px;max-width:1100px;margin:0 auto;padding-bottom:32px;}

.month-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;}
.month-tab{flex-shrink:0;background:#1a1a1a;border:.5px solid #2a2a2a;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;color:#888;cursor:pointer;white-space:nowrap;}
.month-tab.active{background:#D4AF37;color:#0d0d0d;border-color:#D4AF37;}

.calendars{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:700px){.calendars{grid-template-columns:1fr;}}

.cal-card{background:#1a1a1a;border:.5px solid #2a2a2a;border-radius:14px;padding:14px;}

/* HEADER ROW: dot + name input + shift buttons */
.cal-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.cal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cal-name-inp{background:transparent;border:none;border-bottom:1px solid #333;color:#f0f0f0;font-size:16px;font-weight:700;outline:none;width:80px;padding:2px 4px;}
.cal-name-inp:focus{border-bottom-color:#D4AF37;}
.shift-btns{margin-left:auto;display:flex;gap:5px;}
.shift-btn{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;border:.5px solid #333;background:#111;color:#666;cursor:pointer;}
.shift-btn.morning.on{background:#5BE38D;color:#0d0d0d;border-color:#5BE38D;}
.shift-btn.night.on{background:#5DBBFF;color:#0d0d0d;border-color:#5DBBFF;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{font-size:10px;font-weight:600;color:#555;text-align:center;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;font-weight:600;color:#888;cursor:default;}
.cal-day.active{color:#f0f0f0;cursor:pointer;background:#111;}
.cal-day.active:hover{background:#2a2a2a;}
.cal-day.off{background:#7f1d1d!important;color:#FF5E5E!important;}
.cal-day.sun{color:#FF5E5E;}
.cal-day.active.sun{color:#FF9090;}
.cal-day.today-mark{outline:1.5px solid #D4AF37;}

.cal-summary{margin-top:10px;font-size:12px;color:#666;text-align:center;}
.cal-summary span{color:#f0f0f0;font-weight:700;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">NAMCHOK99</div>
    <div class="login-sub">Staff Schedule · กรุณาเข้าสู่ระบบ</div>
    <div class="login-lbl">รหัสผ่าน</div>
    <input class="login-inp" type="password" id="pin-inp" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="topbar">
  <a href="/" style="text-decoration:none;">
    <div class="topbar-logo"><img src="logo.png" style="height:32px;width:auto;object-fit:contain;"> ตารางงาน</div>
  </a>
  <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
</div>

<div class="wrap">
  <div class="month-tabs" id="month-tabs"></div>
  <div class="calendars" id="calendars"></div>
</div>

<script>
const PIN='1234';
const DEFAULT_STAFF=[
  {key:'fin', name:'ฟิน', color:'#5BE38D'},
  {key:'bin', name:'บิน', color:'#5DBBFF'},
  {key:'peng',name:'เป้ง',color:'#D4AF37'}
];
const MONTHS=[
  {y:2026,m:7,label:'ก.ค.'},
  {y:2026,m:8,label:'ส.ค.'},
  {y:2026,m:9,label:'ก.ย.'},
  {y:2026,m:10,label:'ต.ค.'},
  {y:2026,m:11,label:'พ.ย.'},
  {y:2026,m:12,label:'ธ.ค.'}
];
const DOW=['อา','จ','อ','พ','พฤ','ศ','ส'];
var curMonth=0;

function lsKey(k,y,m){return'nc_sched_'+k+'_'+y+'_'+m;}
function shiftKey(k){return'nc_shift_'+k;}
function nameKey(k){return'nc_name_'+k;}

function getOff(k,y,m){try{return JSON.parse(localStorage.getItem(lsKey(k,y,m))||'[]');}catch(e){return[];}}
function setOff(k,y,m,arr){localStorage.setItem(lsKey(k,y,m),JSON.stringify(arr));}
function getShift(k){return localStorage.getItem(shiftKey(k))||'';}
function setShift(k,v){localStorage.setItem(shiftKey(k),v);}
function getName(s){return localStorage.getItem(nameKey(s.key))||s.name;}
function saveName(k,v){localStorage.setItem(nameKey(k),v);}

function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function firstDow(y,m){return new Date(y,m-1,1).getDay();}

function renderCalendar(staff,y,m){
  var days=daysInMonth(y,m);
  var fd=firstDow(y,m);
  var off=getOff(staff.key,y,m);
  var today=new Date();
  var todayD=(today.getFullYear()===y&&today.getMonth()+1===m)?today.getDate():0;
  var shift=getShift(staff.key);
  var displayName=getName(staff);

  var html='<div class="cal-card">';
  // Header: dot + editable name + shift buttons
  html+='<div class="cal-header">';
  html+='<div class="cal-dot" style="background:'+staff.color+'"></div>';
  html+='<input class="cal-name-inp" value="'+displayName+'" onchange="saveName(\''+staff.key+'\',this.value)" title="แก้ชื่อ"/>';
  html+='<div class="shift-btns">';
  html+='<button class="shift-btn morning'+(shift==='morning'?' on':'')+'" onclick="toggleShift(\''+staff.key+'\',\'morning\')">เช้า</button>';
  html+='<button class="shift-btn night'+(shift==='night'?' on':'')+'" onclick="toggleShift(\''+staff.key+'\',\'night\')">ดึก</button>';
  html+='</div></div>';

  // Calendar grid
  html+='<div class="cal-grid">';
  DOW.forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
  for(var i=0;i<fd;i++)html+='<div class="cal-day"></div>';
  for(var d=1;d<=days;d++){
    var dow=(fd+d-1)%7;
    var isOff=off.indexOf(d)!==-1;
    var cls='cal-day active'+(dow===0?' sun':'')+(isOff?' off':'')+(d===todayD?' today-mark':'');
    html+='<div class="'+cls+'" onclick="toggleDay(\''+staff.key+'\','+y+','+m+','+d+')">'+d+'</div>';
  }
  html+='</div>';
  html+='<div class="cal-summary">หยุด <span>'+off.length+'</span> วัน · ทำงาน <span>'+(days-off.length)+'</span> วัน</div>';
  html+='</div>';
  return html;
}

function toggleDay(k,y,m,d){
  var off=getOff(k,y,m);
  var idx=off.indexOf(d);
  if(idx===-1)off.push(d);else off.splice(idx,1);
  setOff(k,y,m,off);
  renderAll();
}

function toggleShift(k,val){
  var cur=getShift(k);
  setShift(k,cur===val?'':val);
  renderAll();
}

function renderAll(){
  var mo=MONTHS[curMonth];
  var html='';
  DEFAULT_STAFF.forEach(function(s){html+=renderCalendar(s,mo.y,mo.m);});
  document.getElementById('calendars').innerHTML=html;
}

function renderTabs(){
  var today=new Date();
  var html='';
  MONTHS.forEach(function(mo,i){
    html+='<div class="month-tab'+(i===curMonth?' active':'')+'" onclick="selectMonth('+i+')">'+mo.label+' '+mo.y+'</div>';
  });
  document.getElementById('month-tabs').innerHTML=html;
}

function selectMonth(i){curMonth=i;renderTabs();renderAll();}

function doLogin(){
  if(document.getElementById('pin-inp').value===PIN){
    localStorage.setItem('nc_auth','1');
    document.getElementById('login-screen').classList.add('hide');
    init();
  }else{document.getElementById('login-err').textContent='รหัสผิด ลองใหม่';}
}
function doLogout(){localStorage.removeItem('nc_auth');location.reload();}

function init(){
  var today=new Date();
  MONTHS.forEach(function(mo,i){
    if(mo.y===today.getFullYear()&&mo.m===today.getMonth()+1)curMonth=i;
  });
  renderTabs();renderAll();
}

if(localStorage.getItem('nc_auth')==='1'){
  document.getElementById('login-screen').classList.add('hide');
  init();
}else{
  setTimeout(function(){document.getElementById('pin-inp').focus();},300);
}
</script>
</body>
</html>
